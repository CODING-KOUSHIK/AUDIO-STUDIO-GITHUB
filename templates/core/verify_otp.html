{% extends "base.html" %}

{% block content %}
<h1>Verify OTP</h1>
<p>An OTP has been sent to your email <strong>{{ email }}</strong></p>

<form method="POST" action="{% url 'verify_otp' %}">
    {% csrf_token %}
    <div class="form-group">
        <label>6-digit OTP Code</label>
        <input type="text" name="otp" required placeholder="Enter here" maxlength="6" pattern="\d{6}">
    </div>

    <button type="submit" class="btn btn-primary">Verify & Continue</button>
</form>

<form method="POST" action="{% url 'resend_otp' %}" id="resend-form" style="margin-top: 15px;">
    {% csrf_token %}
    <button type="submit" class="btn btn-primary" id="resend-btn" disabled
        style="background-color: gray; cursor: not-allowed; opacity: 0.7;">
        Resend OTP (wait <span id="timer">30</span>s)
    </button>
</form>

<script>
    let timeLeft = 30;
    const timerElem = document.getElementById('timer');
    const resendBtn = document.getElementById('resend-btn');

    const countdown = setInterval(() => {
        timeLeft--;
        timerElem.textContent = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(countdown);
            resendBtn.disabled = false;
            resendBtn.style.backgroundColor = '';
            resendBtn.style.cursor = 'pointer';
            resendBtn.style.opacity = '1';
            resendBtn.innerHTML = 'Resend OTP';
        }
    }, 1000);
</script>
{% endblock %}
